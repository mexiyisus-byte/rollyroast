<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — Rolly Roast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'RobuckRounded';
      src: url('fonts/RobuckRounded.otf') format('opentype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --terracotta: #C0432A;
      --terracotta-dark: #8B2D1A;
      --terracotta-light: #D4614A;
      --cream: #F8F6F2;
      --warm-white: #FFFFFF;
      --charcoal: #3A3A3A;
      --warm-gray: #8A8A8A;
      --turquoise: #7BADA8;
      --turquoise-light: #A8CECA;
      --stone: #E8E4DE;
      --border: rgba(192,67,42,0.12);
    }
    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--terracotta);
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 18px 40px;
      background: rgba(248,246,242,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .back-link {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--warm-gray);
      text-decoration: none;
      transition: color 0.25s;
    }
    .back-link:hover { color: var(--terracotta); }
    .header-logo {
      font-family: 'RobuckRounded', 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--terracotta);
      text-decoration: none;
      text-align: center;
    }
    .header-nav {
      display: flex;
      gap: 28px;
      list-style: none;
      justify-content: flex-end;
      align-items: center;
    }
    .header-nav a {
      font-size: 13px;
      font-weight: 500;
      color: var(--warm-gray);
      text-decoration: none;
      transition: color 0.25s;
    }
    .header-nav a:hover, .header-nav a.active { color: var(--terracotta); }

    /* MAIN */
    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 80px;
    }

    /* CONTACT LIST */
    .contact-list {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 56px;
    }
    .contact-entry {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .contact-entry-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--warm-gray);
    }
    .contact-entry-value {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 3vw, 38px);
      font-weight: 700;
      color: var(--terracotta);
      text-decoration: none;
      transition: color 0.25s;
    }
    a.contact-entry-value:hover { color: var(--terracotta-dark); }

    @media (max-width: 600px) {
      .contact-list { gap: 40px; padding: 0 24px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="back-link">← Inicio</a>
    <a href="index.html" class="header-logo">Rolly Roast</a>
    <ul class="header-nav">
      <li><a href="menu.html">Menú</a></li>
      <li><a href="nosotros.html">Nosotros</a></li>
      <li><a href="contacto.html" class="active">Contacto</a></li>
    </ul>
  </header>

  <main>
    <div class="contact-list">

      <div class="contact-entry">
        <span class="contact-entry-label">Teléfono</span>
        <a href="tel:+5255XXXXXXXX" class="contact-entry-value">+52 55 XXXX XXXX</a>
      </div>

      <div class="contact-entry">
        <span class="contact-entry-label">Únete a nuestro equipo</span>
        <a href="mailto:jobs@rollyroast.com" class="contact-entry-value">jobs@rollyroast.com</a>
      </div>

      <div class="contact-entry">
        <span class="contact-entry-label">Prensa y RP</span>
        <a href="mailto:hello@rollyroast.com" class="contact-entry-value">hello@rollyroast.com</a>
      </div>

    </div>
  </main>

</body>
</html>
