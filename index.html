<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolly Roast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'RobuckRounded';
      src: url('fonts/RobuckRounded.otf') format('opentype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --terracotta: #C0432A;
      --terracotta-dark: #8B2D1A;
      --terracotta-light: #D4614A;
      --cream: #F8F6F2;
      --warm-white: #FFFFFF;
      --charcoal: #3A3A3A;
      --warm-gray: #8A8A8A;
      --turquoise: #7BADA8;
      --turquoise-light: #A8CECA;
      --stone: #E8E4DE;
      --border: rgba(192,67,42,0.12);
    }
    html, body {
      height: 100vh;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    /* SLIDESHOW */
    .slideshow {
      position: relative;
      width: 100%;
      height: 100vh;
    }
    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }
    .slide.active { opacity: 1; }
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(26,20,16,0.45) 0%,
        rgba(26,20,16,0.1) 45%,
        rgba(26,20,16,0.55) 100%
      );
    }

    /* BRAND */
    .brand-name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      font-family: 'RobuckRounded', 'Playfair Display', serif;
      font-size: clamp(48px, 8vw, 120px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--terracotta);
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ADDRESS */
    .address {
      position: absolute;
      top: 36px;
      left: 40px;
      z-index: 10;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    /* NAV */
    .side-nav {
      position: absolute;
      bottom: 52px;
      left: 40px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .side-nav a {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 3.8vw, 58px);
      font-weight: 700;
      font-style: italic;
      color: white;
      text-decoration: none;
      line-height: 1.15;
      transition: color 0.25s, transform 0.25s;
      display: inline-block;
    }
    .side-nav a:hover {
      color: rgba(123,173,168,0.85);
      transform: translateX(10px);
    }

    /* EST TAG */
    .est-tag {
      position: absolute;
      bottom: 40px;
      right: 36px;
      z-index: 10;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      writing-mode: vertical-rl;
    }

    /* LANG TOGGLE */
    .lang-toggle {
      position: absolute;
      top: 28px;
      right: 36px;
      z-index: 10;
      display: flex;
      align-items: center;
      border-radius: 50px;
      padding: 4px;
      gap: 2px;
    }
    .lang-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      background: transparent;
      border: none;
      padding: 6px 12px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .lang-btn.active {
      background: var(--terracotta);
      color: white;
    }

    /* ARROWS */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.25s;
      color: white;
      font-size: 20px;
    }
    .arrow:hover { background: rgba(255,255,255,0.3); }
    .arrow-left { left: 24px; }
    .arrow-right { right: 24px; }
  </style>
</head>
<body>
  <div class="slideshow">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1800&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=1800&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1509365465985-25d11c17e812?w=1800&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=1800&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=1800&q=80')"></div>

    <span class="address" data-es="Ciudad de México &nbsp;·&nbsp; [Colonia, CP]" data-en="Mexico City &nbsp;·&nbsp; [Neighborhood, ZIP]">Ciudad de México &nbsp;·&nbsp; [Colonia, CP]</span>

    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es')">ESP</button>
      <button class="lang-btn" onclick="setLang('en')">ENG</button>
    </div>

    <h1 class="brand-name">Rolly Roast</h1>

    <nav class="side-nav">
      <a href="menu.html" data-es="Menú" data-en="Menu">Menú</a>
      <a href="nosotros.html" data-es="Nosotros" data-en="About">Nosotros</a>
      <a href="contacto.html" data-es="Contacto" data-en="Contact">Contacto</a>
    </nav>

    <span class="est-tag">Est. 2026</span>

    <button class="arrow arrow-left" onclick="moveSlide(-1)">&#8592;</button>
    <button class="arrow arrow-right" onclick="moveSlide(1)">&#8594;</button>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    let timer = null;

    function goTo(index) {
      slides[current].classList.remove('active');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
    }

    function moveSlide(dir) {
      goTo(current + dir);
      clearInterval(timer);
      timer = setInterval(() => goTo(current + 1), 4000);
    }

    timer = setInterval(() => goTo(current + 1), 4000);

    function setLang(lang) {
      document.querySelectorAll('[data-es]').forEach(el => {
        el.innerHTML = el.dataset[lang];
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase().startsWith(lang));
      });
    }
  </script>
</body>
</html>
