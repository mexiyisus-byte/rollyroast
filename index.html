<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolly Roast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'RobuckRounded';
      src: url('fonts/RobuckRounded.otf') format('opentype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --terracotta: #C0432A;
      --cream: #FAF7F2;
      --charcoal: #1A1410;
      --warm-gray: #7A6E66;
      --sage: #5C8A6B;
    }
    html, body {
      height: 100vh;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      position: relative;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      position: relative;
    }

    /* PANELS */
    .panel {
      position: relative;
      overflow: hidden;
    }
    .panel-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transform: scale(1.04);
      transition: transform 8s ease-out;
    }
    .panel-bg.loaded { transform: scale(1); }
    .panel-overlay {
      position: absolute;
      inset: 0;
    }

    /* LEFT */
    .panel-left .panel-bg {
      background-image: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1400&q=80');
    }
    .panel-left .panel-overlay {
      background: linear-gradient(
        to bottom,
        rgba(26,20,16,0.52) 0%,
        rgba(26,20,16,0.08) 45%,
        rgba(26,20,16,0.62) 100%
      );
    }
    .address {
      position: absolute;
      top: 36px;
      left: 40px;
      z-index: 2;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }
    .side-nav {
      position: absolute;
      bottom: 52px;
      left: 40px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .side-nav a {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 3.8vw, 58px);
      font-weight: 700;
      font-style: italic;
      color: white;
      text-decoration: none;
      line-height: 1.15;
      transition: color 0.25s, transform 0.25s;
      display: inline-block;
    }
    .side-nav a:hover {
      color: rgba(255,255,255,0.5);
      transform: translateX(10px);
    }

    /* BRAND OVERLAY */
    .brand-name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      font-family: 'RobuckRounded', 'Playfair Display', serif;
      font-size: clamp(28px, 3vw, 52px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--terracotta);
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }

    /* RIGHT */
    .panel-right .panel-bg {
      background-image: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=1400&q=80');
    }
    .panel-right .panel-overlay {
      background: rgba(26,20,16,0.2);
    }
    .est-tag {
      position: absolute;
      bottom: 40px;
      right: 36px;
      z-index: 2;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      writing-mode: vertical-rl;
    }
  </style>
</head>
<body>
  <h1 class="brand-name">Rolly Roast</h1>
  <div class="layout">

    <!-- LEFT -->
    <div class="panel panel-left">
      <div class="panel-bg" id="bgLeft"></div>
      <div class="panel-overlay"></div>
      <span class="address">Ciudad de México &nbsp;·&nbsp; [Colonia, CP]</span>
      <nav class="side-nav">
        <a href="menu.html">Menú</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </div>

    <!-- RIGHT -->
    <div class="panel panel-right">
      <div class="panel-bg" id="bgRight"></div>
      <div class="panel-overlay"></div>
      <span class="est-tag">Est. 2025</span>
    </div>

  </div>
  <script>
    setTimeout(() => {
      document.getElementById('bgLeft').classList.add('loaded');
      document.getElementById('bgRight').classList.add('loaded');
    }, 100);
  </script>
</body>
</html>
